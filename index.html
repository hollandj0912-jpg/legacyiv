<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legacy IV Digital Solutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #e8650a;
      --orange-light: #ff8c2a;
      --orange-glow: 0 0 8px #e8650a, 0 0 20px #e8650a88, 0 0 40px #e8650a44;
      --orange-text-glow: 0 0 6px #e8650a, 0 0 18px #e8650acc, 0 0 36px #e8650a66;
      --orange-border-glow: 0 0 6px #e8650a, 0 0 16px #e8650a99, 0 0 30px #e8650a44;
      --dark: #0a0a0a;
      --dark2: #111111;
      --dark3: #181818;
      --card: #141414;
      --white: #ffffff;
      --gray: #aaaaaa;
      --light-gray: #cccccc;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--dark); color: var(--white); font-family: 'Barlow', sans-serif; font-weight: 400; overflow-x: hidden; }

    /* ── NAV ── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 60px; position: sticky; top: 0; z-index: 200;
      background: rgba(10,10,10,0.97); border-bottom: 1px solid #1e1e1e;
    }
    .nav-logo img { height: 52px; object-fit: contain; display: block; }
    .nav-logo-fallback { display: none; align-items: center; gap: 6px; }
    .nav-logo-fallback .brand { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 24px; letter-spacing: 2px; color: var(--white); }
    .nav-logo-fallback .iv { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 28px; color: var(--orange); text-shadow: var(--orange-text-glow); }

    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--light-gray); font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover { color: var(--white); }

    .nav-phone {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--orange); text-decoration: none; font-size: 14px;
      font-weight: 700; letter-spacing: 1px; text-shadow: var(--orange-text-glow);
      transition: opacity 0.2s; white-space: nowrap;
    }
    .nav-phone:hover { opacity: 0.8; }
    .nav-phone svg { width: 14px; height: 14px; stroke: var(--orange); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 5px rgba(232,101,10,0.8)); flex-shrink: 0; }

    /* Mobile hamburger */
    .nav-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; }
    .nav-toggle span { display: block; width: 24px; height: 2px; background: var(--white); border-radius: 2px; transition: all 0.3s; }

    /* Mobile nav drawer */
    .mobile-nav {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,10,0.98); z-index: 300; flex-direction: column;
      align-items: center; justify-content: center; gap: 36px;
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav a { color: var(--white); text-decoration: none; font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; transition: color 0.2s; }
    .mobile-nav a:hover { color: var(--orange); text-shadow: var(--orange-text-glow); }
    .mobile-nav .mobile-phone { color: var(--orange); text-shadow: var(--orange-text-glow); }
    .mobile-close { position: absolute; top: 20px; right: 24px; background: none; border: none; color: var(--white); font-size: 32px; cursor: pointer; line-height: 1; }

    /* ── BUTTONS ── */
    .btn-primary {
      background: var(--orange); color: var(--white); border: none; padding: 14px 28px;
      font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 1.2px;
      text-transform: uppercase; cursor: pointer; border-radius: 4px; display: inline-flex;
      align-items: center; gap: 8px; text-decoration: none; transition: all 0.25s;
      box-shadow: var(--orange-glow); white-space: nowrap;
    }
    .btn-primary:hover { background: var(--orange-light); box-shadow: 0 0 14px #e8650a, 0 0 36px #e8650aaa; transform: translateY(-1px); }
    .btn-primary svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

    .btn-outline {
      background: transparent; color: var(--white); border: 1.5px solid var(--orange);
      padding: 13px 26px; font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 13px;
      letter-spacing: 1.2px; text-transform: uppercase; cursor: pointer; border-radius: 4px;
      display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
      transition: all 0.25s; box-shadow: var(--orange-border-glow); white-space: nowrap;
    }
    .btn-outline:hover { background: rgba(232,101,10,0.1); box-shadow: 0 0 12px #e8650a, 0 0 28px #e8650a88; }
    .btn-outline svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

    /* ── HERO ── */
    .hero {
      min-height: 90vh; display: grid; grid-template-columns: 1fr 1fr;
      align-items: center; padding: 80px 60px; gap: 50px;
      position: relative; overflow: hidden;
    }
    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 70% 50%, rgba(232,101,10,0.07) 0%, transparent 60%); pointer-events: none; }

    .hero-left { position: relative; z-index: 2; }
    .hero-headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 6.5vw, 88px);
      line-height: 0.94; letter-spacing: 1px; margin-bottom: 24px;
    }
    .hero-headline .line1, .hero-headline .line2 { color: var(--white); display: block; }
    .hero-headline .line3 { color: var(--orange); display: block; text-shadow: var(--orange-text-glow); }
    .hero-subtext { font-size: 16px; font-weight: 300; color: var(--light-gray); line-height: 1.75; max-width: 400px; margin-bottom: 40px; }
    .hero-ctas { display: flex; gap: 16px; flex-wrap: wrap; }

    /* ── LAPTOP / CRM MOCKUP ── */
    .hero-right { position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; }
    .laptop-wrap { position: relative; width: 100%; max-width: 560px; }
    .laptop-glow { position: absolute; inset: -40px; background: radial-gradient(ellipse, rgba(232,101,10,0.18) 0%, transparent 70%); pointer-events: none; z-index: 0; }
    .laptop { background: #1a1a1a; border-radius: 14px 14px 0 0; padding: 16px 16px 8px; border: 1.5px solid #333; box-shadow: 0 0 60px rgba(232,101,10,0.15), 0 40px 80px rgba(0,0,0,0.6); position: relative; z-index: 1; }
    .laptop-screen { background: #0d0d0d; border-radius: 6px; border: 1px solid #222; overflow: hidden; }
    .laptop-base { background: #252525; height: 14px; border-radius: 0 0 10px 10px; border: 1.5px solid #333; border-top: none; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
    .laptop-notch { width: 56px; height: 5px; background: #1a1a1a; border-radius: 0 0 4px 4px; }

    /* CRM dashboard inside laptop */
    .crm-layout { display: flex; min-height: 260px; }
    .crm-sidebar { width: 36px; background: #080808; border-right: 1px solid #1e1e1e; display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 10px; flex-shrink: 0; }
    .crm-icon { width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #444; }
    .crm-icon.active { background: rgba(232,101,10,0.15); color: var(--orange); box-shadow: 0 0 8px rgba(232,101,10,0.3); }
    .crm-icon svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 2; fill: none; }
    .crm-main { flex: 1; padding: 12px; overflow: hidden; }
    .dash-header { font-size: 9px; color: var(--gray); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #1e1e1e; }
    .dash-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; margin-bottom: 10px; }
    .stat-card { background: #141414; border: 1px solid #1e1e1e; border-radius: 4px; padding: 8px; }
    .stat-label { font-size: 8px; color: #666; margin-bottom: 2px; }
    .stat-value { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: var(--white); line-height: 1; }
    .stat-change { font-size: 8px; color: var(--orange); font-weight: 600; margin-top: 2px; text-shadow: 0 0 6px rgba(232,101,10,0.6); }
    .dash-bottom { display: grid; grid-template-columns: 1.6fr 1fr; gap: 7px; }
    .dash-chart-box, .dash-sources-box { background: #141414; border: 1px solid #1e1e1e; border-radius: 4px; padding: 8px; }
    .dash-box-title { font-size: 8px; color: #666; margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
    .chart-date-row { display: flex; justify-content: space-between; font-size: 7px; color: #444; margin-top: 2px; }
    .source-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-size: 8px; }
    .source-left { display: flex; align-items: center; gap: 5px; color: #888; }
    .source-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .source-pct { color: var(--white); font-weight: 600; }

    /* ── SECTION LABELS ── */
    .section-eyebrow { color: var(--orange); font-size: 12px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; text-align: center; margin-bottom: 10px; text-shadow: var(--orange-text-glow); }
    .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(26px, 4vw, 42px); font-weight: 900; letter-spacing: 2px; text-align: center; text-transform: uppercase; color: var(--white); margin-bottom: 48px; }

    /* ── SERVICES ── */
    .services { padding: 90px 60px; background: var(--dark2); }
    .services-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .service-card { background: var(--card); border: 1px solid #222; border-radius: 8px; padding: 36px 22px; text-align: center; transition: all 0.3s; position: relative; overflow: hidden; }
    .service-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(232,101,10,0.05) 0%, transparent 60%); opacity: 0; transition: opacity 0.3s; }
    .service-card:hover::before { opacity: 1; }
    .service-card:hover { border-color: rgba(232,101,10,0.4); transform: translateY(-4px); }
    .service-icon { margin-bottom: 18px; display: flex; align-items: center; justify-content: center; }
    .service-icon svg { width: 48px; height: 48px; stroke: var(--orange); stroke-width: 1.5; fill: none; filter: drop-shadow(0 0 6px rgba(232,101,10,0.7)) drop-shadow(0 0 14px rgba(232,101,10,0.35)); }
    .service-name { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; color: var(--white); margin-bottom: 12px; line-height: 1.2; }
    .service-desc { font-size: 13px; color: var(--gray); line-height: 1.65; font-weight: 300; }

    /* ── PROCESS ── */
    .process { padding: 90px 60px; background: var(--dark); }
    .process-steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; position: relative; align-items: start; }
    .process-connector { position: absolute; top: 34px; left: 12.5%; width: 75%; height: 2px; background: linear-gradient(to right, var(--orange), var(--orange-light)); box-shadow: var(--orange-border-glow); z-index: 0; }
    .step { text-align: center; position: relative; z-index: 1; padding: 0 12px; }
    .step-num { color: var(--orange); font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 13px; letter-spacing: 1px; margin-bottom: 6px; text-shadow: var(--orange-text-glow); }
    .step-icon-wrap { width: 68px; height: 68px; border-radius: 50%; border: 2px solid var(--orange); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; background: var(--dark); box-shadow: var(--orange-border-glow); }
    .step-icon-wrap svg { width: 28px; height: 28px; stroke: var(--orange); stroke-width: 1.5; fill: none; filter: drop-shadow(0 0 5px rgba(232,101,10,0.8)); }
    .step-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; color: var(--white); margin-bottom: 10px; }
    .step-desc { font-size: 13px; color: var(--gray); line-height: 1.65; font-weight: 300; }

    /* ── ABOUT + CTA SPLIT ── */
    .split-section { display: grid; grid-template-columns: 1fr 1fr; }
    .about-panel { padding: 80px 60px; background: var(--dark2); }
    .cta-panel { padding: 80px 60px; background: var(--dark3); display: flex; flex-direction: column; justify-content: center; }
    .panel-eyebrow { color: var(--orange); font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px; text-shadow: var(--orange-text-glow); }
    .panel-title { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(26px, 3vw, 38px); font-weight: 900; letter-spacing: 1px; text-transform: uppercase; line-height: 1.1; margin-bottom: 20px; }
    .panel-divider { width: 40px; height: 3px; background: var(--orange); box-shadow: var(--orange-glow); margin-bottom: 22px; animation: glowPulse 2.8s ease-in-out infinite; }
    .panel-text { font-size: 14px; color: var(--gray); line-height: 1.75; font-weight: 300; max-width: 460px; }
    .panel-text + .panel-text { margin-top: 14px; }

    .kids-glow { color: var(--orange); text-shadow: var(--orange-text-glow); font-weight: 700; }

    .about-img-wrap { margin-top: 28px; border-radius: 8px; overflow: hidden; border: 1px solid rgba(232,101,10,0.3); box-shadow: 0 0 20px rgba(232,101,10,0.2), 0 0 60px rgba(232,101,10,0.07), 0 8px 32px rgba(0,0,0,0.6); }
    .about-img { width: 100%; display: block; object-fit: cover; filter: brightness(0.92); transition: filter 0.3s; }
    .about-img:hover { filter: brightness(1.05); }

    /* ── FOOTER ── */
    footer { background: #060606; border-top: 1px solid #1a1a1a; }
    .footer-inner { display: flex; justify-content: space-between; align-items: flex-start; padding: 52px 60px 40px; gap: 60px; }
    .footer-brand { display: flex; flex-direction: column; gap: 8px; }
    .footer-logo-text { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 24px; letter-spacing: 2px; color: var(--white); }
    .footer-logo-text span { color: var(--orange); text-shadow: var(--orange-text-glow); }
    .footer-tagline { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #444; }
    .footer-contact-label { font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--orange); text-shadow: var(--orange-text-glow); margin-bottom: 16px; }
    .footer-link { display: flex; align-items: center; gap: 10px; font-size: 15px; color: var(--gray); text-decoration: none; font-weight: 400; padding: 7px 0; transition: color 0.2s; }
    a.footer-link:hover { color: var(--white); }
    .footer-link svg { width: 16px; height: 16px; stroke: var(--orange); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; filter: drop-shadow(0 0 5px rgba(232,101,10,0.7)); }
    .footer-bottom { border-top: 1px solid #111; padding: 18px 60px; text-align: center; font-size: 12px; color: #444; letter-spacing: 0.5px; }
    .footer-bottom .hl { color: var(--orange); text-shadow: var(--orange-text-glow); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes glowPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .hero-left > * { opacity: 0; animation: fadeUp 0.7s ease forwards; }
    .hero-headline { animation-delay: 0.1s; }
    .hero-subtext { animation-delay: 0.25s; }
    .hero-ctas { animation-delay: 0.4s; }
    .hero-right { opacity: 0; animation: fadeUp 0.9s ease 0.3s forwards; }

    /* ══════════════════════════════════════
       RESPONSIVE — TABLET (≤1100px)
    ══════════════════════════════════════ */
    @media (max-width: 1100px) {
      nav { padding: 16px 32px; }
      .hero { padding: 60px 32px; gap: 36px; }
      .services { padding: 70px 32px; }
      .services-grid { grid-template-columns: repeat(2, 1fr); }
      .process { padding: 70px 32px; }
      .about-panel, .cta-panel { padding: 70px 40px; }
      .footer-inner { padding: 44px 40px 32px; gap: 40px; }
      .footer-bottom { padding: 18px 40px; }
    }

    /* ══════════════════════════════════════
       RESPONSIVE — MOBILE (≤768px)
    ══════════════════════════════════════ */
    @media (max-width: 768px) {
      /* Nav */
      nav { padding: 14px 20px; }
      .nav-links { display: none; }
      .nav-phone { display: none; }
      .nav-toggle { display: flex; }

      /* Hero — stacked, laptop shown below headline */
      .hero {
        grid-template-columns: 1fr;
        min-height: auto;
        padding: 48px 20px 56px;
        gap: 40px;
        text-align: center;
      }
      .hero::before { background: radial-gradient(ellipse at 50% 30%, rgba(232,101,10,0.09) 0%, transparent 65%); }
      .hero-subtext { max-width: 100%; margin-left: auto; margin-right: auto; }
      .hero-ctas { justify-content: center; }
      .hero-headline { font-size: clamp(44px, 12vw, 68px); }

      /* Laptop mockup on mobile — simplified */
      .hero-right { width: 100%; }
      .laptop-wrap { max-width: 100%; }
      .laptop { padding: 12px 12px 6px; border-radius: 10px 10px 0 0; }
      .crm-layout { min-height: 200px; }
      .crm-sidebar { width: 30px; }
      .crm-icon { width: 20px; height: 20px; }
      .crm-main { padding: 10px; }
      .dash-stats { gap: 5px; margin-bottom: 8px; }
      .stat-value { font-size: 18px; }
      .dash-bottom { grid-template-columns: 1fr; gap: 6px; }
      .dash-sources-box svg { display: none; }

      /* Services */
      .services { padding: 60px 20px; }
      .services-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .service-card { padding: 28px 16px; }
      .service-icon svg { width: 40px; height: 40px; }
      .section-title { margin-bottom: 36px; }

      /* Process */
      .process { padding: 60px 20px; }
      .process-steps { grid-template-columns: 1fr 1fr; gap: 36px 20px; }
      .process-connector { display: none; }
      .step { padding: 0; }

      /* About + CTA */
      .split-section { grid-template-columns: 1fr; }
      .about-panel { padding: 56px 20px; }
      .cta-panel { padding: 56px 20px; align-items: flex-start; }
      .panel-title { font-size: clamp(24px, 7vw, 34px); }
      .panel-text { max-width: 100%; }
      .cta-panel .btn-primary { align-self: stretch; justify-content: center; }

      /* Footer */
      .footer-inner { flex-direction: column; padding: 40px 20px 28px; gap: 32px; }
      .footer-bottom { padding: 16px 20px; }
      .footer-link { font-size: 14px; }
    }

    /* ══════════════════════════════════════
       RESPONSIVE — SMALL PHONES (≤400px)
    ══════════════════════════════════════ */
    @media (max-width: 400px) {
      .hero-headline { font-size: 40px; }
      .services-grid { grid-template-columns: 1fr; }
      .process-steps { grid-template-columns: 1fr; }
      .btn-primary, .btn-outline { width: 100%; justify-content: center; }
      .hero-ctas { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

<!-- ══ NAV ══ -->
<nav>
  <div class="nav-logo">
    <img src="logo.png" alt="Lega
